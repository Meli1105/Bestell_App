<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bestell App</title>

    <link
      rel="icon"
      type="image/x-icon"
      href="./assets/icons/favicon-32x32.png"
    />

    <script src="./scripts/dishes.js"></script>
    <script src="./scripts/templates.js"></script>
    <script src="./scripts/script.js"></script>
    <script src="./scripts/calculation.js"></script>

    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/standard.css" />
    <link rel="stylesheet" href="./styles/assets.css" />
    <link rel="stylesheet" href="./styles/media.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
      rel="stylesheet"
    />
  </head>

  <body onload="init()">
    <div class="full_screen">
      <header>
        <div class="logo_area">
          <img
            class="logo_img"
            src="./assets/icons/android-chrome-512x512.png"
          />
          <img class="logo_img" src="./assets/icons/Bestell App- Logo.svg" />
        </div>
      </header>

      <main class="content_wrapper">
        

        <section class="content" id="content"></section>

        <section class="button_wrapper" id="button_wrapper"></section>

        <section class="basket_wrapper">
          <div class="basket" id="basket"></div>
        </section>
      </main>
      <div id="overlay" class="overlay" onclick="toggleOverlay()">
        <div class="overlay_content" onclick="event.stopPropagation()">
          <div id="orderConfirmation" class="order_confirmation"></div>
        </div>
      </div>

      <footer>
        <div class="contribution">
          <div class="contribution_box">
            <a class="footer_headlines"
              >Images by:
              <a class="contribution_box" href="https://pixabay.com/">
                Pixabay</a
              ></a
            >
            <br />
            <a
              class="contribution_box"
              href="https://pixabay.com/users/deeznutz1-3086161/?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=8904839"
              >Dee</a
            >
            <br />
            <a
              class="contribution_box"
              href="https://pixabay.com/users/ritae-19628/?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=1392266"
              >Rita-👩‍🍳 und 📷 mit ❤</a
            >
          </div>

          <div class="contribution_box">
            <a class="footer_headlines">Icons by: </a>Flaticon <br />
            <a
              class="contribution_box"
              href="https://www.flaticon.com/free-icons/next"
              title="next icons"
              >Next icons created by Pixel perfect</a
            >
            <br />
            <a
              class="contribution_box"
              href="https://www.flaticon.com/free-icons/eliminate"
              title="eliminate icons"
              >Eliminate icons created by Uniconlabs</a
            >
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
